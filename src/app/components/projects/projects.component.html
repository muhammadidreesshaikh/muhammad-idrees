<div class="main-projects">
    <div class="container">
      <div class="row">
  
        <div class="col-12">
          <div class="page-heading">
            <h3>Projects</h3>
            <div class="seprator mt-2"></div>
          </div>
        </div>
  
        <div class="col-12">
          <div class="inner">
            <div class="row">
  
              <div class="col-12 col-md-6 col-lg-3" *ngFor="let item of cards">
                <div class="container1">
                  <img src={{item.image}} class="image" style="width:100%">
  
                  <div class="middle">
                    <a href="{{item.link}}" class="name">{{item.name}}</a>
                  </div>  
                </div>
              </div>
  
            </div>
          </div>
        </div>
  
      </div>
    </div>
  </div>
