<div class="client">
  <div class="container">
    <div class="row justify-content-center">

      <div class="col-12">
        <div class="page-heading">
          <h3>Clients</h3>
          <div class="seprator mt-2"></div>
        </div>
      </div>

      <div class="col-12">
        <div class="client-inner">
          <div class="row">
            <div class="col-6 col-md-3 col-lg-2" *ngFor="let item of data">
              <img src={{item.image}}>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
